# ============================================================
# Traefik – Configuration statique
# Lab     : GreyHaven
# Hôte    : carcharoth.greyhaven – 192.168.1.42
# Domaine : *.greyhaven (DNS interne uniquement)
#
# Note TLS : Le domaine .greyhaven étant privé, Let's Encrypt
# n'est pas utilisé. Traefik génère des certificats auto-signés.
# Pour un CA local de confiance, utilisez mkcert :
#   mkcert -install && mkcert "*.greyhaven"
# puis montez les certificats dans le volume traefik_certs et
# référencez-les dans config/traefik/dynamic/tls.yml.
#
# Documentation : https://doc.traefik.io/traefik/
# ============================================================

# ── API & tableau de bord ────────────────────────────────────
api:
  dashboard: true
  insecure: false   # Dashboard protégé par le middleware auth@file

# ── Points d'entrée ─────────────────────────────────────────
entryPoints:
  # HTTP – redirige automatiquement vers HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS – TLS auto-signé (pas de certResolver pour domaine privé)
  websecure:
    address: ":443"

# ── Fournisseurs ────────────────────────────────────────────
providers:
  # Découverte automatique des services via les labels Docker
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy

  # Fichiers de configuration dynamique (middlewares, routes, TLS)
  file:
    directory: /etc/traefik/dynamic
    watch: true

# ── Logs ────────────────────────────────────────────────────
log:
  level: "${TRAEFIK_LOG_LEVEL:-INFO}"
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Authorization: drop

# ── Ping (healthcheck interne) ───────────────────────────────
ping: {}
