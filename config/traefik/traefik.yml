# ============================================================
# Traefik – Configuration statique
# Lab     : Exemple lab
# Hôte    : host1.lab.local – 192.168.10.10
# Domaine : *.lab.local (DNS interne uniquement)
#
# Note TLS : Le domaine .lab.local étant privé, Let's Encrypt
# n'est pas utilisé. Traefik génère des certificats auto-signés.
# Pour un CA local de confiance, utilisez mkcert :
#   mkcert -install && mkcert "*.lab.local"
# puis référencez les fichiers dans config/traefik/dynamic/tls.yml.
# En mode domaine interne, retirez aussi les labels
# `traefik.http.routers.*.tls.certresolver=letsencrypt` du docker-compose.
#
# Documentation : https://doc.traefik.io/traefik/
# ============================================================

# ── API & tableau de bord ────────────────────────────────────
api:
  dashboard: true
  insecure: false   # Dashboard protégé par le middleware auth@file

# ── Points d'entrée ─────────────────────────────────────────
entryPoints:
  # HTTP – redirige automatiquement vers HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS – TLS auto-signé (pas de certResolver pour domaine privé)
  websecure:
    address: ":443"

# ── Fournisseurs ────────────────────────────────────────────
providers:
  # Découverte automatique des services via les labels Docker
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy

  # Fichiers de configuration dynamique (middlewares, routes, TLS)
  file:
    directory: /etc/traefik/dynamic
    watch: true

# ── Logs ────────────────────────────────────────────────────
log:
  level: "INFO"
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Authorization: drop

# ── ACME / Let's Encrypt (DNS-01 Cloudflare) ───────────────
certificatesResolvers:
  letsencrypt:
    acme:
      # Remplacez cette valeur par une adresse email de contact valide pour Let's Encrypt.
      # Ne commitez pas d'adresse personnelle si ce dépôt doit rester générique.
      email: "replace-with-your-email@example.com"
      storage: "/certs/acme.json"
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# ── Métriques Prometheus ─────────────────────────────────────
# Expose les métriques sur l'entrypoint interne "traefik" (:8080)
# Accessible via http://HOST:8080/metrics
# Compatible Grafana (dashboard Traefik officiel : ID 17346)
#
# Métriques disponibles :
#   - traefik_requests_total         → nombre total de requêtes
#   - traefik_request_duration_seconds → latence (histogram)
#   - traefik_router_requests_total   → requêtes par router
#   - traefik_service_requests_total  → requêtes par service backend
#   - traefik_entrypoint_requests_total → requêtes par entrypoint
metrics:
  prometheus:
    addEntryPointsLabels: true   # Métriques par entrypoint (web, websecure)
    addRoutersLabels: true        # Métriques par router (adguard, traefik-dashboard…)
    addServicesLabels: true       # Métriques par service backend
    entryPoint: traefik           # Exposé sur le port interne :8080/metrics

# ── Tracing distribué (désactivé – nécessite un backend) ─────
# Décommentez si vous avez un collecteur OTLP (Jaeger, Grafana Tempo…)
# tracing:
#   otlp:
#     http:
#       endpoint: "http://jaeger:4318"   # URL de votre collecteur OTLP
#
# Pour démarrer Jaeger rapidement en local :
#   docker run -d --name jaeger -p 16686:16686 -p 4318:4318 jaegertracing/all-in-one:latest

# ── Ping (healthcheck interne) ───────────────────────────────
ping: {}
