# ============================================================
# Traefik – Routes statiques (configuration dynamique)
# Lab     : Exemple lab
# Hôte    : host1.lab.local – 192.168.10.10
#
# Ces routes complètent celles définies par les labels Docker.
# Elles permettent de router des services qui ne tournent pas
# dans des conteneurs (ex : media.lab.local).
# ============================================================

http:
  routers:

    # ── Media – forwarding vers le hub multimédia (Plex) ───
    # Redirige https://media.${DOMAIN} vers 192.168.10.20:32400
    # (port 32400 = Plex Media Server)

    # Exemple de route externe (adapter ou supprimer si inutile)
    # media:
    #   rule: "Host(`media.greyhaven.local`)"
    #   entryPoints:
    #     - websecure
    #   tls: {}
    #   middlewares:
    #     - auth@file
    #     - secure-headers@file
    #   service: palantir-svc

    # gw:
    #   rule: "Host(`gw.greyhaven.local`)"
    #   entryPoints:
    #     - websecure
    #   tls: {}
    #   middlewares:
    #     - auth@file
    #     - secure-headers@file
    #   service: gandalf-svc

  services:

    # Service palantir – hub multimédia (Plex sur port 32400)
    palantir-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.2:32400"
        passHostHeader: true

    # Service gandalf – interface admin du routeur (port 80 par ex.)
    gandalf-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.1.254:80"
        passHostHeader: true
