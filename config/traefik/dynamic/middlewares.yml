# ============================================================
# Traefik – Configuration dynamique
# Middlewares réutilisables + paramètres TLS globaux
# Lab : Exemple lab
# ============================================================

http:
  middlewares:

    # ── Authentification basique ─────────────────────────────
    # Protège les tableaux de bord (Traefik, Pi-hole).
    # Pour générer un hash bcrypt personnalisé :
    #   htpasswd -nB admin
    # Placez ensuite la ligne complète renvoyée par htpasswd à la place du placeholder ci-dessous.
    # Dans ce fichier YAML chargé directement par Traefik, conservez les $ simples du hash brut.
    auth:
      basicAuth:
        users:
          - "replace_with_user:replace_with_bcrypt_hash"

    # ── En-têtes de sécurité HTTP ────────────────────────────
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"

    # ── Limitation du débit ──────────────────────────────────
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # ── Compression des réponses ─────────────────────────────
    compress:
      compress: {}

    # ── Redirection HTTP → HTTPS ─────────────────────────────
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

# ── Configuration TLS globale ────────────────────────────────
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      sniStrict: true
