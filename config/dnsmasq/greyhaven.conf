# ============================================================
# dnsmasq – Configuration étendue pour le domaine lab.local
# Fichier : /etc/dnsmasq.d/99-lab.conf (dans Pi-hole)
#
# Ce fichier complète custom.list avec des directives dnsmasq
# avancées : domaine local, TTL, reverse DNS, DHCP (optionnel).
#
# Documentation dnsmasq : https://thekelleys.org.uk/dnsmasq/docs/dnsmasq-man.html
# ============================================================

# ── Domaine local ────────────────────────────────────────────
# Indique à dnsmasq que "lab.local" est le domaine local.
# Les requêtes pour les noms courts (ex: media) seront
# automatiquement complétées en media.lab.local.
domain=lab.local
local=/lab.local/

# ── TTL des réponses locales ─────────────────────────────────
# Durée de vie des enregistrements DNS renvoyés par Pi-hole.
# 300 secondes = 5 minutes (bon compromis pour un lab).
local-ttl=300


# ── Résolution inverse (PTR) pour le sous-réseau lab.local ──
# Permet les requêtes reverse DNS (ex: nslookup 192.168.10.10)
# sans les transmettre au DNS amont.
rev-server=192.168.10.0/24,127.0.0.1

# ── Enregistrements PTR explicites ──────────────────────────
ptr-record=1.10.168.192.in-addr.arpa,gw.lab.local
ptr-record=20.10.168.192.in-addr.arpa,media.lab.local
ptr-record=10.10.168.192.in-addr.arpa,host1.lab.local

# ── SRV records (optionnel) ──────────────────────────────────
# Décommentez si vous souhaitez annoncer des services via DNS-SD.
# srv-host=_http._tcp.lab.local,traefik.lab.local,80
# srv-host=_https._tcp.lab.local,traefik.lab.local,443

# ── Filtrage de sous-domaines sensibles ─────────────────────
# Bloque les tentatives de résolution de domaines locaux hors lab.local.
# (Évite les fuites DNS vers l'upstream pour les noms internes.)
bogus-priv
stop-dns-rebind
rebind-localhost-ok

# ── Cache DNS ────────────────────────────────────────────────
# Taille du cache dnsmasq (nombre d'enregistrements en mémoire).
# Pi-hole gère son propre cache FTL, mais cette valeur affecte
# les requêtes transitant par dnsmasq directement.
cache-size=10000

# ── Expiration des entrées négatives ────────────────────────
# Durée pendant laquelle dnsmasq mémorise un échec de résolution.
neg-ttl=60
