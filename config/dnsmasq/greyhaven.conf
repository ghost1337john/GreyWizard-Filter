# ============================================================
# dnsmasq – Configuration étendue pour le domaine greyhaven
# Fichier : /etc/dnsmasq.d/99-greyhaven.conf (dans Pi-hole)
#
# Ce fichier complète custom.list avec des directives dnsmasq
# avancées : domaine local, TTL, reverse DNS, DHCP (optionnel).
#
# Documentation dnsmasq : https://thekelleys.org.uk/dnsmasq/docs/dnsmasq-man.html
# ============================================================

# ── Domaine local ────────────────────────────────────────────
# Indique à dnsmasq que "greyhaven" est le domaine local.
# Les requêtes pour les noms courts (ex: palantir) seront
# automatiquement complétées en palantir.greyhaven.
domain=greyhaven
local=/greyhaven/

# ── TTL des réponses locales ─────────────────────────────────
# Durée de vie des enregistrements DNS renvoyés par Pi-hole.
# 300 secondes = 5 minutes (bon compromis pour un lab).
local-ttl=300

# ── Résolution inverse (PTR) pour le sous-réseau greyhaven ──
# Permet les requêtes reverse DNS (ex: nslookup 192.168.1.3)
# sans les transmettre au DNS amont.
rev-server=192.168.1.0/24,127.0.0.1

# ── Enregistrements PTR explicites ──────────────────────────
ptr-record=254.1.168.192.in-addr.arpa,gandalf.greyhaven
ptr-record=2.1.168.192.in-addr.arpa,palantir.greyhaven
ptr-record=42.1.168.192.in-addr.arpa,carcharoth.greyhaven

# ── SRV records (optionnel) ──────────────────────────────────
# Décommentez si vous souhaitez annoncer des services via DNS-SD.
# srv-host=_http._tcp.greyhaven,traefik.greyhaven,80
# srv-host=_https._tcp.greyhaven,traefik.greyhaven,443

# ── Filtrage de sous-domaines sensibles ─────────────────────
# Bloque les tentatives de résolution de domaines locaux hors greyhaven.
# (Évite les fuites DNS vers l'upstream pour les noms internes.)
bogus-priv
stop-dns-rebind
rebind-localhost-ok

# ── Cache DNS ────────────────────────────────────────────────
# Taille du cache dnsmasq (nombre d'enregistrements en mémoire).
# Pi-hole gère son propre cache FTL, mais cette valeur affecte
# les requêtes transitant par dnsmasq directement.
cache-size=10000

# ── Expiration des entrées négatives ────────────────────────
# Durée pendant laquelle dnsmasq mémorise un échec de résolution.
neg-ttl=60
