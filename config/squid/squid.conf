
# Squid – Configuration proxy HTTP/HTTPS
#
# Réseau LAN    : YOUR_LAN_CIDR    (ex: 192.168.1.0/24)
# Réseau Docker : 172.16.0.0/12    (sous-réseaux bridge Docker – ne pas modifier)
# Hôte          : YOUR_SERVER_IP   (ex: 192.168.1.10)
# DNS           : YOUR_DNS_IP      (ex: IP du conteneur AdGuard Home)
#=============================================

# Port d'écoute du proxy
http_port 3128

# ── Définition des ACL ────────────────────────────────────────
acl localnet   src YOUR_LAN_CIDR      # Réseau LAN (ex: 192.168.1.0/24)
acl localnet   src 172.16.0.0/12      # Réseaux bridge Docker (172.16–31.x.x)
acl localhost  src 127.0.0.1/32 ::1   # Loopback

acl SSL_ports  port 443
acl Safe_ports port 80                # HTTP
acl Safe_ports port 443               # HTTPS
acl Safe_ports port 21                # FTP
acl Safe_ports port 1025-65535        # High ports (applications)

acl CONNECT method CONNECT            # Tunnels HTTPS (CONNECT method)

# ── Règles d'accès (l'ordre est CRITIQUE) ────────────────────
# 1. Refuser les requêtes vers des ports non autorisés
http_access deny !Safe_ports

# 2. Refuser CONNECT si le port n'est pas 443
http_access deny CONNECT !SSL_ports

# 3. Autoriser le loopback et le réseau local (y compris Docker)
http_access allow localhost
http_access allow localnet

# 4. Tout refuser par défaut
http_access deny all

# ── Cache ─────────────────────────────────────────────────────
cache_mem 256 MB
maximum_object_size_in_memory 4 MB
cache_dir ufs /var/spool/squid 1000 16 256
maximum_object_size 100 MB

# ── Logs ──────────────────────────────────────────────────────
access_log /var/log/squid/access.log squid

# ── DNS ───────────────────────────────────────────────────────
# Pointe vers AdGuard Home (filtrage DNS actif pour le proxy)
dns_nameservers YOUR_DNS_IP

# ── Anonymisation du proxy ────────────────────────────────────
httpd_suppress_version_string on
via off
forwarded_for delete

