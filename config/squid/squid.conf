
# Squid - Configuration proxy HTTP/HTTPS

# Domaine du lab : replace_with_your_internal_domain
# Hôte : replace_with_your_server_hostname - replace_with_your_server_ip
# Réseau : replace_with_your_lan_cidr
#=============================================

#Acces the port Squid listens on
http_port 3128

# ACL - Listes de contrôle d'accès
acl localnet src 192.168.1.0/24
acl localnet src 127.0.0.1/32

# Autoriser le LAN
http_access allow localnet
http_access allow localnet

# Allow ports fort connect method {HTTPS tunneling)
acl ssl_ports port 443
acl Safe_ports port 80        # HTTP
acl Safe_ports port 443       # HTTPS
acl Safe_ports port 21        # FTP
acl Safe_ports port 1025-65535 # High ports

# Deny access to unsafe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow local network access
http_access allow localnet
http_access allow localhost

# Deny everything else
http_access deny all

# Cache settings - 1GB disk cache, 256MB memory cache
cache_mem 256 MB
maximum_object_size_in_memory 4 MB
cache_dir ufs /var/spool/squid 1000 16 256
maximum_object_size 100 MB

# Log format
access_log /var/log/squid/access.log squid

# DNS settings
dns_nameservers 192.168.1.3

# Proxy identity (hide version info)
httpd_suppress_version_string on
via off
forwarded_for delete

