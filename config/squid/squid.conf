# ============================================================
# Squid – Configuration proxy HTTP/HTTPS
# Lab     : Exemple lab
# Hôte    : host1.lab.local – 192.168.10.10
# Réseau  : 192.168.10.0/24
#
# Rôle dans la stack lab.local :
#   • Proxy HTTP/HTTPS pour les clients du LAN
#   • Cache disque pour réduire la consommation de bande passante
#   • Délégation DNS vers Pi-hole (filtrage + résolution locale)
#   • Masquage de l'IP client vis-à-vis des serveurs distants
#
# Configuration clients :
#   → Proxy HTTP  : 192.168.1.42:3128
#   → Proxy HTTPS : 192.168.1.42:3128
# ============================================================

# ── Port d'écoute ───────────────────────────────────────────
# Squid écoute les requêtes proxy entrantes.
# Les clients du LAN (192.168.10.0/24) doivent configurer leur
# navigateur ou OS pour pointer vers host1:3128.
http_port 3128

# ── Cache disque ────────────────────────────────────────────
# ufs            = format de cache Unix File System
# /var/spool/squid = répertoire du volume Docker persistant
# 2048           = taille max du cache (Mo) — ajustez selon l'espace disque
# 16 / 256       = sous-répertoires L1/L2
cache_dir ufs /var/spool/squid 2048 16 256

# Quantité de RAM allouée au cache en mémoire vive.
# Recommandé : 10–20 % de la RAM disponible sur carcharoth.
cache_mem 256 MB

# Taille max d'un objet conservé en RAM (au-delà → disque).
maximum_object_size_in_memory 512 KB

# Taille max d'un objet mis en cache sur disque.
maximum_object_size 50 MB

# ── Timeouts ────────────────────────────────────────────────
connect_timeout 30 seconds
read_timeout    300 seconds
request_timeout 60 seconds

# ── ACL – Listes de contrôle d'accès ────────────────────────

# Réseau lab.local autorisé à utiliser le proxy.
acl localnet src 192.168.10.0/24

# Réseaux internes Docker (conteneurs peuvent utiliser le proxy).
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12

# RFC 4193 / RFC 4291 (IPv6 local)
acl localnet src fc00::/7
acl localnet src fe80::/10

# Port HTTPS autorisé pour la méthode CONNECT (tunnel TLS).
acl SSL_ports port 443

# Ports HTTP considérés comme légitimes.
acl Safe_ports port 80          # HTTP
acl Safe_ports port 21          # FTP
acl Safe_ports port 443         # HTTPS
acl Safe_ports port 70          # Gopher
acl Safe_ports port 210         # WAIS
acl Safe_ports port 1025-65535  # Ports applicatifs non-réservés
acl Safe_ports port 280         # HTTP-MGMT
acl Safe_ports port 488         # GSS-HTTP
acl Safe_ports port 591         # FileMaker
acl Safe_ports port 777         # Multiling HTTP

# Méthode HTTP utilisée pour les tunnels HTTPS.
acl CONNECT method CONNECT

# ── Règles d'accès ──────────────────────────────────────────
# Évaluées dans l'ordre — la première règle correspondante s'applique.

# 1. Bloquer les requêtes vers des ports non listés dans Safe_ports.
http_access deny !Safe_ports

# 2. Bloquer les tunnels CONNECT vers des ports autres que 443.
http_access deny CONNECT !SSL_ports

# 3. Gestionnaire de cache : accès localhost uniquement.
http_access allow localhost manager
http_access deny manager

# 4. Autoriser les clients du LAN lab.local (192.168.10.0/24).
http_access allow localnet

# 5. Autoriser localhost (healthchecks Docker, etc.).
http_access allow localhost

# 6. Refuser tout ce qui n'a pas été explicitement autorisé.
http_access deny all

# ── Résolution DNS interne ──────────────────────────────────
# Squid délègue sa résolution DNS à Pi-hole (172.30.0.2 sur pihole_net).
# Avantages :
#   • Les noms lab.local (custom.list) sont résolus correctement.
#   • La publicité est filtrée même pour le trafic qui passe par le proxy.
#   • La résolution DNS externe est assurée par Pi-hole via Quad9 (9.9.9.9).
dns_nameservers 172.30.0.2

# ── Logs ────────────────────────────────────────────────────
access_log       /var/log/squid/access.log squid
cache_log        /var/log/squid/cache.log
cache_store_log  none

# ── Confidentialité ─────────────────────────────────────────
# Ne pas transmettre l'IP réelle du client aux serveurs distants.
forwarded_for off

# Supprimer les en-têtes qui révèlent la présence du proxy.
request_header_access Via deny all
request_header_access X-Forwarded-For deny all

# ── Identité du proxy ────────────────────────────────────────
# Affiché dans les pages d'erreur et les logs Squid.
visible_hostname carcharoth-proxy
