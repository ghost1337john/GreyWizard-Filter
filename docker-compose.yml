## ============================================================
# Lab Example – docker-compose.yml
#
# Stack : Pi-hole (DNS + filtrage pub) +
#         Squid   (proxy HTTP/HTTPS)   +
#         Traefik (reverse proxy)
#
# Hôte           : host1.lab.local – 192.168.10.10
# Domaine interne: lab.local
# Réseau local   : 192.168.10.0/24
#
# Prérequis : Docker >= 20.x, Docker Compose >= 2.x
# Usage     : cp .env.example .env && docker compose up -d
# ============================================================

# networks:
#   proxy:
#     name: proxy
#     driver: bridge

volumes:
  squid_cache:
  # traefik_certs:

services:

