## ============================================================
# Lab Example – docker-compose.yml
#
# Stack : AdGuard Home (DNS + filtrage pub) +
#         Squid        (proxy HTTP/HTTPS)   +
#         Traefik      (reverse proxy, optionnel)
#
# Hôte           : host1.lab.local – 192.168.10.10
# Domaine interne: lab.local
# Réseau local   : 192.168.10.0/24
#
# Prérequis : Docker >= 20.x, Docker Compose >= 2.x
# Usage     : cp .env.example .env && docker compose up -d
# ============================================================

networks:
  proxy:
    name: proxy
    driver: bridge


volumes:
  squid_cache:
  traefik_certs:

services:
  # ── Traefik – reverse proxy ──────────────────────────────────
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
       - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_certs:/certs
    environment:
      - TZ=${TZ:-Europe/Paris}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    labels:
      - "traefik.enable=true"
      # Tableau de bord – accessible sur https://traefik.lab.local
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth@file,secure-headers@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3



  # ── AdGuard Home – DNS + bloqueur publicitaire ───────────────
  # Activez ce service si DNS_ENGINE=adguardhome
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    networks:
       - proxy
    ports:
      - ":53:53/tcp"
      - ":53:53/udp"
      - ":3000:3000/tcp"
      - "${ADGUARD_PORT:-3000}:${ADGUARD_PORT:-3000}/tcp" # Interface web accessible sur le port choisi
    volumes:
      - ./config/adguardhome/work:/opt/adguardhome/work
      - ./config/adguardhome/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ:-Europe/Paris}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguardhome.rule=Host(`adguard.${DOMAIN}`)"
      - "traefik.http.routers.adguardhome.entrypoints=websecure"
      - "traefik.http.routers.adguardhome.tls=true"
      - "traefik.http.routers.adguardhome.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adguardhome.middlewares=auth@file,secure-headers@file"
      - "traefik.http.services.adguardhome.loadbalancer.server.port=${ADGUARD_PORT:-3000}"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /opt/adguardhome/conf/AdGuardHome.yaml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Squid – proxy HTTP/HTTPS avec cache ──────────────────────
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    restart: unless-stopped
    networks:
       - proxy
    ports:
      # Proxy accessible au LAN lab.local sur host1:3128
      - ":3128:3128"
    volumes:
      - ./config/squid/squid.conf:/etc/squid/squid.conf:ro
      - squid_cache:/var/spool/squid
    environment:
      - TZ=${TZ:-Europe/Paris}
    # ...
    healthcheck:
      test: ["CMD", "sh", "-c", "squid -k parse -f /etc/squid/squid.conf && squid -k check -f /etc/squid/squid.conf"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
